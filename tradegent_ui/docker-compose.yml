
services:
  # Agent UI Backend Server
  agui-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradegent-agui
    ports:
      - "8081:8081"
    environment:
      # Server
      AGUI_HOST: "0.0.0.0"
      AGUI_PORT: "8081"
      FRONTEND_URL: "http://localhost:3001"

      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-google/gemini-2.0-flash-001}

      # MCP Servers
      IB_MCP_URL: "http://host.docker.internal:8100/mcp"
      RAG_MCP_CMD: "python -m tradegent.rag.mcp_server"
      GRAPH_MCP_CMD: "python -m tradegent.graph.mcp_server"
      MCP_CWD: "/app/tradegent"

      # Database
      PG_HOST: ${PG_HOST:-host.docker.internal}
      PG_PORT: ${PG_PORT:-5433}
      PG_USER: ${PG_USER:-tradegent}
      PG_PASS: ${PG_PASS}
      PG_DB: ${PG_DB:-tradegent}

      # Neo4j (for graph MCP)
      NEO4J_URI: ${NEO4J_URI:-bolt://host.docker.internal:7688}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASS: ${NEO4J_PASS}

    volumes:
      # Mount tradegent for MCP subprocess access
      - ../tradegent:/app/tradegent:ro
      - ../tradegent_knowledge:/app/tradegent_knowledge:ro
      - ../shared:/app/shared:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    restart: unless-stopped

    networks:
      - tradegent_nexus-net

  # Frontend (Next.js) - for development
  # In production, build and serve static files
  agui-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradegent-agui-frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://agui-server:8081"
      NEXT_PUBLIC_WS_URL: "ws://agui-server:8081/ws/agent"
      AUTH_SECRET: "${AUTH_SECRET:-default-secret-change-me}"
      AUTH_TRUST_HOST: "true"
    depends_on:
      - agui-server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tradegent_nexus-net

networks:
  tradegent_nexus-net:
    driver: bridge
    external: true
