<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradegent Agent UI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #00d4ff; margin-bottom: 20px; }
        .chat-box { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; min-height: 400px; max-height: 600px; overflow-y: auto; }
        .message { margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; }
        .message.user { background: #0f3460; margin-left: 20%; }
        .message.assistant { background: #1a1a2e; border: 1px solid #333; margin-right: 20%; }
        .message pre { white-space: pre-wrap; font-size: 13px; }
        .component { background: #0f3460; border-radius: 8px; padding: 12px; margin-top: 8px; border-left: 3px solid #00d4ff; }
        .component-type { color: #00d4ff; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .input-row { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: none; border-radius: 8px; background: #16213e; color: #eee; font-size: 16px; }
        input[type="text"]:focus { outline: 2px solid #00d4ff; }
        button { padding: 12px 24px; border: none; border-radius: 8px; background: #00d4ff; color: #1a1a2e; font-weight: bold; cursor: pointer; }
        button:hover { background: #00b4d8; }
        button:disabled { background: #555; cursor: not-allowed; }
        .status { display: flex; gap: 20px; margin-bottom: 20px; font-size: 14px; }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot.healthy { background: #00ff88; }
        .status-dot.degraded { background: #ffaa00; }
        .status-dot.unhealthy { background: #ff4444; }
        .metrics-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .metric { background: #0f3460; padding: 8px 12px; border-radius: 6px; }
        .metric-label { font-size: 11px; color: #888; }
        .metric-value { font-size: 18px; font-weight: bold; color: #00d4ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Tradegent Agent UI</h1>

        <div class="status" id="status">
            <div class="status-item"><span class="status-dot" id="status-dot"></span><span id="status-text">Connecting...</span></div>
        </div>

        <div class="chat-box" id="chat-box"></div>

        <div class="input-row">
            <input type="text" id="message-input" placeholder="Ask something... (e.g., 'help', 'system status', 'analyze NVDA')" />
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8081';
        let sessionId = null;

        async function checkHealth() {
            try {
                const res = await fetch(`${API_URL}/health`);
                const data = await res.json();
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');

                dot.className = `status-dot ${data.status}`;
                text.textContent = `${data.status.toUpperCase()} - IB: ${data.mcp_servers.ib_mcp ? '✓' : '✗'} RAG: ${data.mcp_servers.trading_rag ? '✓' : '✗'} Graph: ${data.mcp_servers.trading_graph ? '✓' : '✗'}`;
            } catch (e) {
                document.getElementById('status-dot').className = 'status-dot unhealthy';
                document.getElementById('status-text').textContent = 'Disconnected';
            }
        }

        function addMessage(role, content, a2ui = null) {
            const chatBox = document.getElementById('chat-box');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            let html = `<pre>${escapeHtml(content)}</pre>`;

            if (a2ui && a2ui.components) {
                for (const comp of a2ui.components) {
                    html += renderComponent(comp);
                }
            }

            msg.innerHTML = html;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderComponent(comp) {
            const type = comp.type;
            const props = comp.props || {};

            let content = '';

            switch (type) {
                case 'TextCard':
                    content = props.content || '';
                    break;
                case 'MetricsRow':
                    content = (props.metrics || []).map(m =>
                        `<div class="metric"><div class="metric-label">${m.label}</div><div class="metric-value">${m.value}</div></div>`
                    ).join('');
                    return `<div class="component"><div class="component-type">${type}</div><div class="metrics-row">${content}</div></div>`;
                case 'AnalysisCard':
                    content = `${props.ticker}: ${props.recommendation} (${props.confidence}% confidence, EV: ${props.expected_value}%)`;
                    break;
                case 'PositionCard':
                    content = `${props.ticker}: ${props.size} shares @ $${props.avg_price} | P&L: ${props.pnl_pct}%`;
                    break;
                case 'GrafanaPanel':
                    return `<div class="component"><div class="component-type">${type}</div><iframe src="http://localhost:3000/d-solo/${props.dashboard_uid}?panelId=${props.panel_id}&from=now-${props.timeframe || '1h'}&theme=${props.theme || 'dark'}" width="100%" height="${props.height || 300}px" frameborder="0"></iframe></div>`;
                default:
                    content = JSON.stringify(props, null, 2);
            }

            return `<div class="component"><div class="component-type">${type}</div><pre>${escapeHtml(content)}</pre></div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const btn = document.getElementById('send-btn');
            const message = input.value.trim();

            if (!message) return;

            input.value = '';
            btn.disabled = true;

            addMessage('user', message);

            try {
                const res = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });

                const data = await res.json();
                sessionId = data.session_id;

                if (data.success) {
                    addMessage('assistant', data.text || '', data.a2ui);
                } else {
                    addMessage('assistant', `Error: ${data.error}`);
                }
            } catch (e) {
                addMessage('assistant', `Connection error: ${e.message}`);
            }

            btn.disabled = false;
            input.focus();
        }

        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        checkHealth();
        setInterval(checkHealth, 10000);
    </script>
</body>
</html>
